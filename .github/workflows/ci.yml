name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Tests run fully offline: deterministic hash embeddings, lexical reranker,
      # stub LLM — no torch, no network, no API keys.
      FINCOPILOT_OFFLINE_MODE: "true"
      FINCOPILOT_EMBED_BACKEND: "hash"
      FINCOPILOT_RERANK_BACKEND: "lexical"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies (lean prod + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Ruff (lint + format check)
        run: |
          ruff check .
          ruff format --check .
      - name: Pytest
        run: pytest -q

  frontend:
    name: Frontend — lint & typecheck & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests (Vitest)
        run: npm test
      - name: Build
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
