name: keep-warm

# Render's free tier spins a service down after ~15 minutes of inactivity, which
# makes the next request take ~50s. Pinging /health every 10 minutes keeps the
# instance hot at zero cost, so the live demo always feels instant.
#
# Note: GitHub disables scheduled workflows on repos with no activity for 60 days
# — a single commit re-enables them.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping the API health endpoint
        run: |
          for attempt in 1 2 3; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 90 \
              "${{ vars.API_URL || 'https://fincopilot-api-qypb.onrender.com' }}/health" || echo "000")
            echo "attempt $attempt -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "API is warm."
              exit 0
            fi
            sleep 20
          done
          echo "::warning::API did not return 200 after 3 attempts (it may still be cold-starting)."
